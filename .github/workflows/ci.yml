name: Build & Push Frontend

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump tag in deploy repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_PAT }}
          script: |
            const sha = context.sha.substring(0, 7);
            const tag = `sha-${sha}`;
            let fileSha;
            try {
              const f = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: 'deploy', path: 'FRONTEND_TAG'
              });
              fileSha = f.data.sha;
            } catch (_) {}
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: 'deploy',
              path: 'FRONTEND_TAG',
              message: `chore: bump frontend → ${tag}`,
              content: Buffer.from(tag + '\n').toString('base64'),
              sha: fileSha
            });
